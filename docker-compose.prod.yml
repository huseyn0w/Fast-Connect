# Production topology for a Hostinger VPS.
#
# Caddy sits at the edge: it terminates TLS (automatic Let's Encrypt certificates)
# and reverse-proxies WebSocket + HTTP traffic to the server and client containers.
# HTTPS is mandatory — browsers block camera/mic (getUserMedia) on insecure origins.
#
#   cp .env.production.example .env.production
#   # edit .env.production (DOMAIN, ACME_EMAIL) and deploy/Caddyfile
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Only the public site origin may open sockets / call the API.
      CORS_ORIGINS: https://${DOMAIN}
      PEER_PATH: /peerjs

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # Empty => the SPA talks to its own origin, which Caddy routes to the server.
        VITE_SERVER_URL: ""
        VITE_PEER_PATH: /peerjs
    restart: unless-stopped
    expose:
      - "80"

volumes:
  caddy_data:
  caddy_config:
