# nginx config for the static SPA container.
# Serves the built Vite bundle and falls back to index.html for client-side routes.
# API/WebSocket proxying lives in the edge proxy (see docker-compose.prod.yml), not here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers for the served SPA. (helmet covers the API/signaling
    # server; these protect the static document the browser actually loads.)
    # CSP is tuned to what the app loads: bundled JS/CSS from self, Google Fonts
    # (CSS from googleapis, fonts from gstatic), inline styles from React/Framer,
    # and signaling/WebRTC over same-origin + ws/wss (localhost entries cover the
    # local prod-style compose where the server is a separate origin on :5000).
    # HSTS is intentionally omitted here and set at the TLS edge (Caddy).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' ws: wss: http://localhost:5000 http://localhost:5055; worker-src 'self' blob:; manifest-src 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=(), payment=(), usb=()" always;

    # Long-cache fingerprinted build assets. (A location-level add_header drops
    # inherited ones, so re-assert nosniff here; CSP isn't needed on JS/CSS.)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA history-API fallback: unknown paths render the app shell.
    # (No add_header here, so it inherits the server-level security headers.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
