# nginx config for the static SPA container.
# Serves the built Vite bundle and falls back to index.html for client-side routes.
# API/WebSocket proxying lives in the edge proxy (see docker-compose.prod.yml), not here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history-API fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
